<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMU AI 教學應用工作坊 — 2026/03</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0f;
            --accent: #00f0ff;
            --sub: #f59e0b;
            --text: #e8e8ed;
            --muted: rgba(232, 232, 237, 0.5);
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(0, 240, 255, 0.35);
            --sub-glow: rgba(245, 158, 11, 0.3);
            --card-hover-border: rgba(0, 240, 255, 0.3);
            --tag-bg: rgba(0, 240, 255, 0.05);
            --tag-border: rgba(0, 240, 255, 0.3);
        }

        /* Light theme variables */
        :root[data-theme="light"] {
            --bg: #f8fafc;
            --accent: #0284c7;
            --sub: #ea580c;
            --text: #0f172a;
            --muted: rgba(15, 23, 42, 0.6);
            --glass: rgba(0, 0, 0, 0.03);
            --border: rgba(0, 0, 0, 0.1);
            --accent-glow: rgba(2, 132, 199, 0.2);
            --sub-glow: rgba(234, 88, 12, 0.2);
            --card-hover-border: rgba(2, 132, 199, 0.3);
            --tag-bg: rgba(2, 132, 199, 0.08);
            --tag-border: rgba(2, 132, 199, 0.3);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid var(--tag-border);
            padding: 6px 16px;
            border-radius: 4px;
            margin-bottom: 24px;
            background: var(--tag-bg);
        }

        h1 {
            font-weight: 900;
            font-size: 56px;
            line-height: 1.15;
            margin-bottom: 12px;
            text-align: center;
        }

        h1 .hi {
            color: var(--accent);
            text-shadow: 0 0 40px var(--accent-glow);
        }

        h1 .hi-sub {
            color: var(--sub);
            text-shadow: 0 0 30px var(--sub-glow);
        }

        .subtitle {
            font-size: 20px;
            color: var(--muted);
            margin-bottom: 48px;
            text-align: center;
        }

        .cards {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 32px;
            width: 260px;
            text-decoration: none;
            color: var(--text);
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, transform 0.3s;
        }

        .card:hover {
            border-color: var(--card-hover-border);
            transform: translateY(-4px);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--sub));
            transform: scaleX(0);
            transition: transform 0.4s;
            transform-origin: left;
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card .num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .card .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card .desc {
            font-size: 16px;
            color: var(--muted);
            line-height: 1.6;
        }

        .footer {
            margin-top: 48px;
            font-size: 14px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
        }

        /* Theme Toggle Button Styles */
        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.05);
        }
        
        [data-theme="light"] .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.03);
        }
    </style>
</head>

<body>
    <button id="theme-toggle" class="theme-toggle" aria-label="切換深淺色模式">
        <!-- Moon Icon (shown in light mode) -->
        <svg id="theme-icon-dark" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <!-- Sun Icon (shown in dark mode) -->
        <svg id="theme-icon-light" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
    </button>

    <div class="tag">KMU AI Workshop 2026/03</div>
    <h1><span class="hi">生成式 AI</span><br>教學應用<span class="hi-sub">工作坊</span></h1>
    <p class="subtitle">講師：廖正雄 Shoung Liao</p>

    <div class="cards">
        <a class="card" href="Day01-Presentation.html">
            <div class="num">Day 01</div>
            <div class="title">認識 AI 與實作</div>
            <div class="desc">AI 趨勢 · Prompt · Google AI Studio · WBC App 實作</div>
        </a>
        <a class="card" href="Day02-Presentation.html">
            <div class="num">Day 02</div>
            <div class="title">規劃的力量</div>
            <div class="desc">MRD · PRD · 上下文工程 · Human-in-the-loop</div>
        </a>
        <a class="card" href="Day03-Presentation.html">
            <div class="num">Day 03</div>
            <div class="title">部署與展示</div>
            <div class="desc">成果展示 · GitHub · Antigravity · 終極工作流</div>
        </a>
    </div>

    <p class="footer">高雄醫學大學 × 生成式 AI 教學應用工作坊</p>
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const iconDark = document.getElementById('theme-icon-dark');
        const iconLight = document.getElementById('theme-icon-light');

        // Check for saved theme or system preference
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        // Use saved theme if exists, otherwise default to dark
        const currentTheme = savedTheme !== null ? savedTheme : 'dark';
        
        // Initialize theme function
        const setTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            if (theme === 'light') {
                iconDark.style.display = 'block';
                iconLight.style.display = 'none';
            } else {
                iconDark.style.display = 'none';
                iconLight.style.display = 'block';
            }
        };

        // Set initial theme
        setTheme(currentTheme);

        // Toggle button click listener
        themeToggle.addEventListener('click', () => {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            const newTheme = isLight ? 'dark' : 'light';
            
            setTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>

</html>
